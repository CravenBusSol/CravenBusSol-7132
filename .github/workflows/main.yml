name: Build Website Distribution

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build project
      run: bun run build

    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: website-dist-folder
        path: |
          dist/
          **/dist/
